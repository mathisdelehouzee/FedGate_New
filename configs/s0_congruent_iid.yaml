experiment: "fedgate_full_s0"

paths:
  artifacts_root: "../artifacts/s0_iid"
  results_root: "../results"

data:
  csv: "../data/cbms_dataset.csv"
  data_root: "../data/MixedDB"
  feature_names:
    - AGE
    - PTGENDER
    - PTEDUCAT
    - PTMARRY
    - CATANIMSC
    - TRAASCOR
    - TRABSCOR
    - DSPANFOR
    - DSPANBAC
    - BNTTOTAL
    - VSWEIGHT
    - BMI
    - MH14ALCH
    - MH16SMOK
    - MH4CARD
    - MH2NEURL
  mri_shape: [96, 96, 96]
  mri_cache:
    enabled: true
    dir: "../artifacts/s0_iid/mri_cache"

seeds: [7, 11, 17]
pretrain_seed: 7

split:
  global_test_ratio: 0.2
  global_test_seed: 2026
  client_val_ratio: 0.1

partition:
  num_clients: 10
  strategy: "balanced"
  label_tolerance: 0.08
  max_size_gap_percent: 1.0
  max_size_gap_samples: 5

model:
  hidden_dim: 128
  dropout: 0.1
  l1_gate: 0.0001

pretrain:
  epochs: 20
  batch_size: 128
  lr: 0.0001
  weight_decay: 0.0001
  device: "auto"
  num_workers: 2
  model_selection_metric: "auroc"

embeddings:
  batch_size: 8
  device: "auto"
  num_workers: 2
  dtype: "float32"
  checkpoint_template: "frozen_encoders_seed{seed}.pt"

scenario:
  name: "FR_S0_congruent_iid"
  description: "Congruent + IID"
  client_type_counts:
    tab_only: 0
    mri_only: 0
    both_aligned: 10
    both_partial: 0
  partial_pairing_rate: 1.0
  apply_to_val: true
  apply_to_test: false

training:
  epochs: 100
  batch_size: 32
  lr: 0.0001
  weight_decay: 0.0001
  device: "auto"
  num_workers: 2
  early_stopping:
    enabled: false
    monitor: "auprc"
    mode: "max"
    patience: 6
    min_delta: 0.0001
    min_epochs: 8

federated:
  num_clients: 10
  num_server_rounds: 100
  fraction_fit: 1.0
  local_epochs: 1
  batch_size: 32
  lr: 0.0001
  weight_decay: 0.0001
  device: "auto"
  num_workers: 2
  early_stopping:
    enabled: false
    monitor: "auprc"
    mode: "max"
    patience: 6
    min_delta: 0.0001
    min_rounds: 8

evaluation:
  threshold:
    mode: "tuned_on_val"
    metric: "f1"
    value: 0.5
    min: 0.05
    max: 0.95
    num_points: 181

plots:
  enabled: true
